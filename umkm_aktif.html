<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UMKM Aktif</title>
</head>
<body>
    <h2>Halaman UMKM Aktif</h2>
    <table border="1" cellpadding="5">
        <tr>
            <th>No</th>
            <th>Nama UMKM</th>
            <th>Jenis</th>
        </tr>
        {% for i, umkm in data_umkm %}
        <tr>
            <td>{{ i }}</td>
            <td>{{ umkm.nama }}</td>
            <td>{{ umkm.jenis }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="3">Tidak ada UMKM aktif</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
